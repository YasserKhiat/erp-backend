name: CI / Build & Quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_quality:
    name: CI / Build & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d erp_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_ci?schema=public
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 1d
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Prisma Migrations
        run: npm run prisma:deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
