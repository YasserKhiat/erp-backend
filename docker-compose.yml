services:
  api:
    container_name: erp-backend-api
    build:
      context: .
      target: dev
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
    command: sh -c "npm run prisma:generate && npm run start:dev"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  api_node_modules:
